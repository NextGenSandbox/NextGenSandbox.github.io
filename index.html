<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Flappy Bird</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #70c5ce;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #70c5ce;
        }
        #ui {
            position: absolute;
            color: white;
            text-align: center;
            pointer-events: none;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="msg">Press OK to Start</h1>
        <h2 id="score">Score: 0</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgDisplay = document.getElementById('msg');
        const scoreDisplay = document.getElementById('score');

        // Set canvas size for TV (Maintain aspect ratio)
        canvas.width = 400;
        canvas.height = 600;

        // Game Constants
        const GRAVITY = 0.25;
        const JUMP = -5.5;
        const PIPE_SPEED = 2;
        const PIPE_SPAWN_RATE = 100; // frames
        const PIPE_GAP = 160;

        let bird = { x: 50, y: 300, velocity: 0, radius: 15 };
        let pipes = [];
        let frameCount = 0;
        let score = 0;
        let gameActive = false;

        // Remote Control Listeners
        window.addEventListener('keydown', (e) => {
            // KeyCode 13 is 'Enter' (Samsung OK button), KeyCode 38 is 'ArrowUp'
            if (e.keyCode === 13 || e.keyCode === 38 || e.code === 'Space') {
                handleAction();
            }
        });

        // Touch/Click for testing or magic remotes
        window.addEventListener('click', handleAction);

        function handleAction() {
            if (!gameActive) {
                resetGame();
                gameActive = true;
                msgDisplay.innerText = "";
            } else {
                bird.velocity = JUMP;
            }
        }

        function resetGame() {
            bird.y = 300;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            scoreDisplay.innerText = "Score: 0";
        }

        function createPipe() {
            let minHeight = 50;
            let maxHeight = canvas.height - PIPE_GAP - 50;
            let height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            pipes.push({ x: canvas.width, y: height });
        }

        function update() {
            if (!gameActive) return;

            // Bird Physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Floor/Ceiling collision
            if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
                gameOver();
            }

            // Pipe Logic
            if (frameCount % PIPE_SPAWN_RATE === 0) createPipe();

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= PIPE_SPEED;

                // Collision detection
                if (
                    bird.x + bird.radius > pipes[i].x &&
                    bird.x - bird.radius < pipes[i].x + 50 &&
                    (bird.y - bird.radius < pipes[i].y || bird.y + bird.radius > pipes[i].y + PIPE_GAP)
                ) {
                    gameOver();
                }

                // Scoring
                if (pipes[i].x === bird.x) {
                    score++;
                    scoreDisplay.innerText = "Score: " + score;
                }

                // Remove off-screen pipes
                if (pipes[i].x + 50 < 0) pipes.splice(i, 1);
            }

            frameCount++;
        }

        function gameOver() {
            gameActive = false;
            msgDisplay.innerText = "GAME OVER\nPress OK to Restart";
        }

        function draw() {
            // Clear Background
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Pipes
            ctx.fillStyle = "#2ecc71";
            pipes.forEach(p => {
                // Top Pipe
                ctx.fillRect(p.x, 0, 50, p.y);
                ctx.strokeRect(p.x, 0, 50, p.y);
                // Bottom Pipe
                ctx.fillRect(p.x, p.y + PIPE_GAP, 50, canvas.height);
                ctx.strokeRect(p.x, p.y + PIPE_GAP, 50, canvas.height);
            });

            // Draw Bird
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Eye
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(bird.x + 8, bird.y - 5, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(bird.x + 10, bird.y - 5, 2, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
