<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.AI 2024 Revival</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 300px;
            background-color: #2c2c2e;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, textarea, button {
            background-color: #3a3a3c;
            border: 1px solid #48484a;
            color: white;
            padding: 10px;
            border-radius: 6px;
        }
        button {
            background-color: #0a84ff;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #007aff; }
        
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #151516;
        }
        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
        }
        .user { background-color: #0a84ff; align-self: flex-end; }
        .bot { background-color: #2c2c2e; align-self: flex-start; }
        #input-area {
            padding: 20px;
            background-color: #1c1c1e;
            display: flex;
            gap: 10px;
        }
        #user-input { flex: 1; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Character Customizer</h3>
        <label>Character Name:</label>
        <input type="text" id="char-name" value="Captain Jax">
        
        <label>Greeting Message:</label>
        <input type="text" id="char-greeting" value="Ahoy, matey! What brings ye to my ship?">
        
        <label>Personality Prompt:</label>
        <textarea id="char-prompt" rows="6">You are Captain Jax, a sarcastic pirate from the 1700s. You love gold, hate sea monsters, and speak in heavy pirate slang. Always stay in character.</textarea>
        
        <button onclick="initializeCharacter()">Apply & Reset Chat</button>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // We will replace this URL with your Render link once the backend is live!
        const BACKEND_URL = "http://localhost:5000"; 
        let chatHistory = [];

        function initializeCharacter() {
            const chatMessages = document.getElementById('chat-messages');
            const greeting = document.getElementById('char-greeting').value;
            const name = document.getElementById('char-name').value;
            
            chatMessages.innerHTML = '';
            chatHistory = [];
            addMessageBubble(name, greeting, 'bot');
        }

        function addMessageBubble(sender, text, type) {
            const chatMessages = document.getElementById('chat-messages');
            const bubble = document.createElement('div');
            bubble.className = `message ${type}`;
            bubble.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return bubble;
        }

        async function sendMessage() {
            const userInput = document.getElementById('user-input');
            const messageText = userInput.value.trim();
            const charPrompt = document.getElementById('char-prompt').value;
            const charName = document.getElementById('char-name').value;

            if (!messageText) return;

            addMessageBubble("You", messageText, "user");
            userInput.value = ''; 

            const typingBubble = addMessageBubble(charName, "Thinking...", "bot");

            try {
                // Sending custom character parameters and context directly to our backend
                const response = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        personality_prompt: charPrompt,
                        chatHistory: chatHistory,
                        userMessage: messageText
                    })
                });

                const data = await response.json();
                typingBubble.innerHTML = `<strong>${charName}:</strong> ${data.reply}`;

                // Track history updates locally
                chatHistory.push({ role: 'user', text: messageText });
                chatHistory.push({ role: 'model', text: data.reply });

            } catch (error) {
                console.error(error);
                typingBubble.innerHTML = `<strong>${charName}:</strong> <em>Error: Couldn't connect to backend server.</em>`;
            }
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
        window.onload = initializeCharacter;
    </script>
</body>
</html>
