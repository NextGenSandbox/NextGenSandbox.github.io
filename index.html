<!DOCTYPE HTML>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Samsung TV Information</title>

<style type="text/css">
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#202020;
    color:#FFFFFF;
    margin:20px;
}

h1{
    color:#00AEEF;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    border:1px solid #555555;
    padding:8px;
}

.label{
    width:220px;
    font-weight:bold;
    background:#333333;
}

button{
    padding:10px;
    font-size:16px;
}
</style>

<script type="text/javascript">

function setValue(id,value){
    document.getElementById(id).innerHTML=value;
}

function loadInfo(){

    setValue("ua",navigator.userAgent);

    setValue("platform",navigator.platform);

    setValue("language",navigator.language || navigator.browserLanguage);

    setValue("cookies",navigator.cookieEnabled ? "Enabled" : "Disabled");

    setValue("online",navigator.onLine ? "Yes" : "No");

    setValue("screen",
        screen.width + " x " + screen.height);

    if(window.tizen){

        try{
            setValue(
                "model",
                tizen.systeminfo.getCapability(
                    "http://tizen.org/system/model_name"
                )
            );
        }catch(e){
            setValue("model","Unavailable");
        }

        try{
            setValue(
                "firmware",
                tizen.systeminfo.getCapability(
                    "http://tizen.org/system/build.string"
                )
            );
        }catch(e){
            setValue("firmware","Unavailable");
        }

    }else{

        setValue("model","Not running on Tizen");

        setValue("firmware","Unavailable");

    }

}

window.onload=loadInfo;

</script>

</head>

<body>

<h1>Samsung TV Information</h1>

<table>

<tr>
<td class="label">Model</td>
<td id="model">Loading...</td>
</tr>

<tr>
<td class="label">Firmware</td>
<td id="firmware">Loading...</td>
</tr>

<tr>
<td class="label">Platform</td>
<td id="platform"></td>
</tr>

<tr>
<td class="label">User Agent</td>
<td id="ua"></td>
</tr>

<tr>
<td class="label">Language</td>
<td id="language"></td>
</tr>

<tr>
<td class="label">Screen Resolution</td>
<td id="screen"></td>
</tr>

<tr>
<td class="label">Cookies</td>
<td id="cookies"></td>
</tr>

<tr>
<td class="label">Online</td>
<td id="online"></td>
</tr>

</table>

<br>

<button onclick="loadInfo();">Refresh</button>

</body>
</html>
